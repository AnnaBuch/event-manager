<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>El compte de la família</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --ink:#1F3A3D;
    --paper:#EFE7D6;
    --paper-dark:#E4D9C0;
    --card:#FBF7EC;
    --mustard:#C0821E;
    --rust:#A8462F;
    --sage:#4F7355;
    --line:#D3C4A0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .font-display{font-family:'Fraunces',serif;font-optical-sizing:auto;}
  .font-mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}

  #app-shell{max-width:560px;margin:0 auto;padding-bottom:48px;min-height:100vh;}

  .header{background:var(--ink);color:var(--paper);padding:28px 20px 22px;}
  .header-title{display:flex;align-items:center;gap:10px;}
  .header-title svg{flex-shrink:0;}
  .header-title span{font-size:22px;font-weight:700;letter-spacing:0.2px;}
  .header p{margin:6px 0 0;font-size:13.5px;opacity:0.75;line-height:1.4;}

  .screen{padding:24px 20px;display:flex;flex-direction:column;gap:18px;}

  .ledger-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    position:relative;
    box-shadow:0 1px 0 rgba(31,58,61,0.04);
  }
  .ledger-card::before{
    content:"";
    position:absolute;left:0;top:10px;bottom:10px;width:3px;
    background-image:radial-gradient(circle, rgba(31,58,61,0.35) 1.5px, transparent 1.6px);
    background-size:3px 12px;
  }

  input[type=text], input[type=number]{
    width:100%;box-sizing:border-box;padding:11px 12px;border-radius:9px;
    border:1.5px solid var(--line);font-size:15.5px;background:#fff;color:var(--ink);outline:none;
    font-family:'Inter',sans-serif;
  }
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  label.field-label{font-size:12.5px;opacity:0.65;display:block;margin-bottom:4px;}

  button{font-family:'Inter',sans-serif;cursor:pointer;}
  button:active{transform:scale(0.97);}

  .btn-primary{
    padding:13px;border-radius:10px;border:none;background:var(--ink);color:var(--paper);
    font-weight:600;font-size:15.5px;width:100%;
  }
  .btn-primary:disabled{opacity:0.6;}
  .btn-outline{
    padding:16px 20px;border-radius:14px;border:1.5px solid var(--mustard);
    background:var(--card);color:var(--ink);font-weight:600;font-size:15.5px;
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  }
  .btn-icon{border:none;background:#fff;border-radius:9px;padding:9px;display:flex;align-items:center;justify-content:center;}
  .btn-link{border:none;background:none;color:var(--ink);opacity:0.55;font-size:13px;text-decoration:underline;}

  .error-text{color:var(--rust);font-size:13.5px;margin:0;}

  .divider-row{display:flex;align-items:center;gap:10px;margin:2px 0;}
  .divider-row .line{flex:1;height:1px;background:var(--line);}
  .divider-row span{font-size:12px;opacity:0.55;}

  .code-bar{display:flex;align-items:center;justify-content:space-between;background:var(--paper-dark);border-radius:12px;padding:10px 14px;}
  .code-bar .label{font-size:11px;opacity:0.6;text-transform:uppercase;letter-spacing:0.5px;}
  .code-bar .code{font-size:17px;font-weight:600;}
  .hint-text{font-size:12.5px;opacity:0.6;margin:-10px 2px 0;}

  .event-name-row{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
  .event-name-row h1{
    font-size:20px;font-weight:600;margin:0;flex:1;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .event-name-row input{font-size:17px;padding:9px 11px;}
  .event-name-edit-actions{display:flex;gap:6px;}

  .section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .section-head h2{font-size:17px;font-weight:600;margin:0;}
  .add-toggle{display:flex;align-items:center;gap:5px;border:none;background:none;color:var(--mustard);font-weight:600;font-size:14px;}

  .empty-state{padding:18px 18px 18px 26px;text-align:center;}
  .empty-state p{margin:0;font-size:14px;opacity:0.65;}

  .participant-row{padding:12px 12px 12px 26px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
  .participant-row .pname{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .participant-row .pfamily{display:flex;align-items:center;gap:4px;font-size:12.5px;opacity:0.6;margin-top:1px;}
  .participant-row .pamount{font-size:15.5px;font-weight:600;white-space:nowrap;}
  .participant-row .prow-right{display:flex;align-items:center;gap:10px;}
  .del-btn{border:none;background:none;padding:4px;opacity:0.45;display:flex;}

  .form-card{padding:18px 18px 18px 26px;margin-top:8px;}
  .form-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .form-head h3{font-size:15.5px;font-weight:600;margin:0;}
  .close-form{border:none;background:none;opacity:0.5;}

  .stepper{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .stepper button{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;}
  .stepper .val{font-size:20px;font-weight:600;min-width:28px;text-align:center;font-family:'IBM Plex Mono',monospace;}
  .stepper .unit{font-size:12.5px;opacity:0.55;}

  .summary-card{padding:16px 18px 16px 26px;}
  .summary-card h2{font-size:16px;font-weight:600;margin:0 0 12px;}
  .summary-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;}
  .summary-row:last-child{margin-bottom:0;}
  .summary-row .k{opacity:0.65;}
  .summary-row .v{font-weight:600;}

  .txn-row{padding:13px 16px 13px 26px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .txn-names{display:flex;align-items:center;gap:8px;font-size:14.5px;min-width:0;}
  .txn-names .from{font-weight:600;color:var(--rust);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .txn-names .to{font-weight:600;color:var(--sage);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .txn-amount{font-size:15.5px;font-weight:700;white-space:nowrap;margin-left:10px;}

  .status-dot{display:inline-flex;align-items:center;gap:6px;font-size:12px;opacity:0.7;}
  .status-dot .dot{width:7px;height:7px;border-radius:50%;background:var(--sage);}
  .status-dot.offline .dot{background:var(--rust);}

  .setup-box{margin:24px 20px;padding:20px;border:1.5px dashed var(--rust);border-radius:14px;background:var(--card);}
  .setup-box h2{font-size:16px;margin:0 0 8px;font-family:'Fraunces',serif;}
  .setup-box p, .setup-box li{font-size:13.5px;line-height:1.5;}
  .setup-box code{background:var(--paper-dark);padding:1px 5px;border-radius:5px;font-size:12.5px;}
</style>
</head>
<body>

<div id="app-shell">
  <div class="header">
    <div class="header-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C0821E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span class="font-display">El compte de la família</span>
    </div>
    <p>Qui ha pagat, qui representa a qui, i qui deu què a qui.</p>
  </div>

  <div id="root"></div>
</div>

<!-- Firebase (compat SDK, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* =========================================================================
   CONFIGURACIÓ DE FIREBASE
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBaxqUSBYfJilL6ka92Z7q39p2loyERkZI",
  authDomain: "gestor-esdeveniments.firebaseapp.com",
  projectId: "gestor-esdeveniments",
  storageBucket: "gestor-esdeveniments.firebasestorage.app",
  messagingSenderId: "421351349259",
  appId: "1:421351349259:web:322d8552f50e224c113b0e"
};
/* ========================================================================= */

const root = document.getElementById('root');

function slugify(str){
  if (!str) return 'TROBADA';
  let s = str.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  s = s.toUpperCase().replace(/[^A-Z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  if (s.length > 16) s = s.slice(0,16).replace(/-+$/,'');
  return s || 'TROBADA';
}
function generateCode(name){
  const slug = slugify(name);
  const n = Math.floor(100 + Math.random()*900);
  return `${slug}-${n}`;
}

let db = null;
let firebaseReady = false;
try {
  if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY_HERE") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  }
} catch (e) {
  firebaseReady = false;
}

let state = {
  screen: 'landing',
  code: null,
  eventName: '',
  participants: [],
  error: '',
  loading: false,
  copied: false,
  showForm: false,
  saving: false,
  connected: true,
  editingName: false,
};
let unsubscribe = null;

function euros(n){
  return n.toLocaleString('ca-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}
function icon(name, color, size){
  size = size || 16; color = color || 'currentColor';
  const icons = {
    users: `<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
    plus: `<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
    minus: `<line x1="5" y1="12" x2="19" y2="12"/>`,
    trash: `<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>`,
    copy: `<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>`,
    check: `<polyline points="20 6 9 17 4 12"/>`,
    arrow: `<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>`,
    x: `<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
    party: `<path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-1.16-.58a2 2 0 0 0-1.8 0L17 13"/><path d="m11 2 .58 1.15a2 2 0 0 0 1.8 1.02l1.62-.4"/><path d="M22 13a17.5 17.5 0 0 0-10 5"/>`,
    pencil: `<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>`
  };
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[name]||''}</svg>`;
}

function computeSettlement(participants){
  const totalCents = participants.reduce((s,p)=>s+Math.round(p.amount*100),0);
  const totalUnits = participants.reduce((s,p)=>s+p.familySize,0);
  if (totalUnits === 0) return {transactions:[], perUnitCents:0, totalCents, totalUnits};
  const perUnitCents = totalCents/totalUnits;
  const balances = participants.map(p=>{
    const paidCents = Math.round(p.amount*100);
    const fairCents = p.familySize*perUnitCents;
    return {name:p.name, balanceCents: paidCents - fairCents};
  });
  const creditors = balances.filter(b=>b.balanceCents>0.5).map(b=>({...b})).sort((a,b)=>b.balanceCents-a.balanceCents);
  const debtors = balances.filter(b=>b.balanceCents<-0.5).map(b=>({...b})).sort((a,b)=>a.balanceCents-b.balanceCents);
  const transactions=[];
  let ci=0, di=0;
  while(ci<creditors.length && di<debtors.length){
    const c=creditors[ci], d=debtors[di];
    const amount = Math.min(c.balanceCents, -d.balanceCents);
    if (amount>0.5) transactions.push({from:d.name, to:c.name, cents:amount});
    c.balanceCents -= amount; d.balanceCents += amount;
    if (c.balanceCents<0.5) ci++;
    if (d.balanceCents>-0.5) di++;
  }
  return {transactions, perUnitCents, totalCents, totalUnits};
}

function render(){
  if (!firebaseReady){ renderSetupNeeded(); return; }
  if (state.screen === 'landing') renderLanding();
  else renderEvent();
}

function renderSetupNeeded(){
  root.innerHTML = `
    <div class="setup-box">
      <h2>Cal connectar una base de dades gratuïta</h2>
      <p>Aquesta app necessita un projecte de <b>Firebase</b> (gratuït) perquè totes les persones puguin veure i afegir dades a la mateixa trobada des de qualsevol dispositiu.</p>
      <p>Obre l'arxiu <code>index.html</code>, busca la secció <code>firebaseConfig</code> a l'inici del <code>&lt;script&gt;</code>, i substitueix-la per la configuració del teu projecte de Firebase. Un cop fet, torna a pujar l'arxiu al teu hosting.</p>
    </div>`;
}

function renderLanding(){
  root.innerHTML = `
    <div class="screen">
      <div class="ledger-card" style="padding:20px 20px 20px 26px;">
        <h2 class="font-display" style="font-size:18px;font-weight:600;margin:0 0 4px;">Uneix-te a una trobada</h2>
        <p style="font-size:13px;opacity:0.65;margin:0 0 14px;">Introdueix el codi que t'han passat.</p>
        <div style="display:flex;gap:8px;">
          <input id="join-input" type="text" placeholder="p.ex. DINAR-482" class="font-mono" style="flex:1;">
          <button id="join-btn" class="btn-primary" style="width:auto;padding:12px 18px;white-space:nowrap;" ${state.loading?'disabled':''}>Entra</button>
        </div>
      </div>
      <div class="divider-row"><div class="line"></div><span>o bé</span><div class="line"></div></div>
      <div class="ledger-card" style="padding:20px 20px 20px 26px;">
        <h2 class="font-display" style="font-size:18px;font-weight:600;margin:0 0 4px;">Crea una trobada nova</h2>
        <p style="font-size:13px;opacity:0.65;margin:0 0 14px;">Posa-li un nom, p. ex. "Dinar de Nadal".</p>
        <div style="display:flex;gap:8px;">
          <input id="create-name-input" type="text" placeholder="Nom de la trobada" style="flex:1;">
          <button id="create-btn" class="btn-primary" style="width:auto;padding:12px 18px;white-space:nowrap;" ${state.loading?'disabled':''}>Crea</button>
        </div>
      </div>
      ${state.error ? `<p class="error-text" style="text-align:center;">${state.error}</p>` : ''}
    </div>`;

  document.getElementById('create-btn').onclick = handleCreate;
  document.getElementById('join-btn').onclick = handleJoin;
  const joinInput = document.getElementById('join-input');
  joinInput.addEventListener('keydown', e=>{ if (e.key==='Enter') handleJoin(); });
  const createInput = document.getElementById('create-name-input');
  createInput.addEventListener('keydown', e=>{ if (e.key==='Enter') handleCreate(); });
}

async function handleCreate(){
  const nameInput = document.getElementById('create-name-input');
  const typedName = (nameInput && nameInput.value || '').trim();
  const finalName = typedName || 'Trobada familiar';
  state.error=''; state.loading=true; render();
  try{
    let newCode = generateCode(finalName);
    const existing = await db.collection('events').doc(newCode).get();
    if (existing.exists) newCode = generateCode(finalName);
    await db.collection('events').doc(newCode).set({ name: finalName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    state.code = newCode;
    state.eventName = finalName;
    state.participants = [];
    state.screen = 'event';
    state.loading = false;
    subscribeToParticipants(newCode);
    render();
  }catch(e){
    state.loading=false;
    state.error = "No s'ha pogut crear la trobada. Torna-ho a provar.";
    render();
  }
}

async function handleJoin(){
  const input = document.getElementById('join-input');
  const trimmed = (input.value||'').trim().toUpperCase();
  if (!trimmed) return;
  state.error=''; state.loading=true; render();
  try{
    const docSnap = await db.collection('events').doc(trimmed).get();
    if (!docSnap.exists){
      state.loading=false;
      state.error = "No s'ha trobat cap trobada amb aquest codi. Revisa-ho amb qui te l'ha donat.";
      render();
      return;
    }
    state.code = trimmed;
    state.eventName = docSnap.data().name || 'Trobada familiar';
    state.screen = 'event';
    state.loading = false;
    subscribeToParticipants(trimmed);
    render();
  }catch(e){
    state.loading=false;
    state.error = "No s'ha trobat cap trobada amb aquest codi. Revisa-ho amb qui te l'ha donat.";
    render();
  }
}

function subscribeToParticipants(code){
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection('events').doc(code).collection('participants')
    .orderBy('createdAt','asc')
    .onSnapshot(snapshot=>{
      state.participants = snapshot.docs.map(d=>({id:d.id, ...d.data()}));
      state.connected = true;
      renderDynamicSections();
    }, err=>{
      state.connected = false;
      renderDynamicSections();
    });
}

function renderEvent(){
  root.innerHTML = `
    <div class="screen">
      ${ state.editingName ? `
        <div class="event-name-row">
          <input id="name-edit-input" type="text" value="${escapeHtml(state.eventName)}" style="flex:1;">
          <div class="event-name-edit-actions">
            <button id="name-save-btn" class="btn-icon" title="Desa">${icon('check','#4F7355',17)}</button>
            <button id="name-cancel-btn" class="btn-icon" title="Cancel·la">${icon('x','#A8462F',17)}</button>
          </div>
        </div>
      ` : `
        <div class="event-name-row">
          <h1 class="font-display">${escapeHtml(state.eventName)}</h1>
          <button id="name-edit-btn" class="btn-icon" title="Canvia el nom">${icon('pencil','#1F3A3D',16)}</button>
        </div>
      `}
      <div class="code-bar">
        <div>
          <div class="label">Codi de la trobada</div>
          <div class="code font-mono">${state.code}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="status-dot ${state.connected?'':'offline'}" id="status-dot"><span class="dot"></span>${state.connected?'en directe':'sense connexió'}</span>
          <button id="copy-btn" class="btn-icon" title="Copia el codi">${icon('copy','#1F3A3D',17)}</button>
        </div>
      </div>
      <p class="hint-text">Comparteix aquest codi (per WhatsApp, per exemple) perquè tothom pugui afegir el que ha pagat.</p>

      <div>
        <div class="section-head">
          <h2 class="font-display">Qui ha pagat què</h2>
          <button id="add-toggle" class="add-toggle" style="${state.showForm?'display:none;':''}">${icon('plus','#C0821E',17)} Afegeix</button>
        </div>
        <div id="ledger-list"></div>
        <div id="form-container"></div>
      </div>

      <div id="summary-container"></div>
      <div id="settlement-container"></div>

      <button id="leave-btn" class="btn-link" style="align-self:center;">Surt d'aquesta trobada</button>
    </div>`;

  document.getElementById('copy-btn').onclick = handleCopy;
  document.getElementById('add-toggle').onclick = ()=>{ state.showForm=true; renderForm(); document.getElementById('add-toggle').style.display='none'; };
  document.getElementById('leave-btn').onclick = handleLeave;

  if (state.editingName){
    const nameInput = document.getElementById('name-edit-input');
    nameInput.focus();
    nameInput.select();
    document.getElementById('name-save-btn').onclick = ()=> renameEvent(nameInput.value);
    document.getElementById('name-cancel-btn').onclick = ()=>{ state.editingName=false; renderEvent(); };
    nameInput.addEventListener('keydown', e=>{
      if (e.key==='Enter') renameEvent(nameInput.value);
      if (e.key==='Escape'){ state.editingName=false; renderEvent(); }
    });
  } else {
    document.getElementById('name-edit-btn').onclick = ()=>{ state.editingName=true; renderEvent(); };
  }

  renderForm();
  renderDynamicSections();
}

async function renameEvent(newName){
  const trimmed = (newName||'').trim() || 'Trobada familiar';
  try{
    await db.collection('events').doc(state.code).update({ name: trimmed });
    state.eventName = trimmed;
  }catch(e){
    // keep previous name locally if the write failed
  }
  state.editingName = false;
  renderEvent();
}

function handleCopy(){
  try{
    navigator.clipboard.writeText(state.code);
  }catch(e){}
}

function handleLeave(){
  if (unsubscribe) { unsubscribe(); unsubscribe=null; }
  state = {...state, screen:'landing', code:null, participants:[], error:'', showForm:false};
  render();
}

function renderForm(){
  const container = document.getElementById('form-container');
  if (!state.showForm){ container.innerHTML=''; return; }
  container.innerHTML = `
    <div class="ledger-card form-card">
      <div class="form-head">
        <h3 class="font-display">Afegeix un pagament</h3>
        <button id="close-form" class="close-form">${icon('x','#1F3A3D',18)}</button>
      </div>
      <label class="field-label">Nom</label>
      <input id="f-name" type="text" placeholder="p. ex. Tia Montse" style="margin-bottom:14px;">
      <label class="field-label">Persones que representa (la seva unitat familiar)</label>
      <div class="stepper">
        <button id="f-minus">${icon('minus','#1F3A3D',18)}</button>
        <div class="val" id="f-family-val">1</div>
        <button id="f-plus">${icon('plus','#1F3A3D',18)}</button>
        <span class="unit">persones</span>
      </div>
      <label class="field-label">Diners gastats (€)</label>
      <input id="f-amount" type="text" inputmode="decimal" placeholder="0,00" style="margin-bottom:16px;">
      <div id="f-error"></div>
      <button id="f-submit" class="btn-primary">Afegeix a la llista</button>
    </div>`;

  let familySize = 1;
  const valEl = document.getElementById('f-family-val');
  document.getElementById('f-minus').onclick = ()=>{ familySize = Math.max(1, familySize-1); valEl.textContent = familySize; };
  document.getElementById('f-plus').onclick = ()=>{ familySize = Math.min(20, familySize+1); valEl.textContent = familySize; };
  document.getElementById('close-form').onclick = ()=>{ state.showForm=false; renderForm(); document.getElementById('add-toggle').style.display=''; };

  document.getElementById('f-submit').onclick = async ()=>{
    const nameVal = document.getElementById('f-name').value.trim();
    const amountRaw = document.getElementById('f-amount').value.replace(',', '.');
    const amt = parseFloat(amountRaw);
    const errEl = document.getElementById('f-error');
    if (!nameVal){ errEl.innerHTML = `<p class="error-text" style="margin:0 0 12px;">Cal un nom.</p>`; return; }
    if (isNaN(amt) || amt<0){ errEl.innerHTML = `<p class="error-text" style="margin:0 0 12px;">Introdueix un import vàlid.</p>`; return; }
    errEl.innerHTML='';
    const submitBtn = document.getElementById('f-submit');
    submitBtn.disabled = true; submitBtn.textContent = 'Desant...';
    try{
      await db.collection('events').doc(state.code).collection('participants').add({
        name: nameVal, familySize, amount: amt, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      state.showForm=false;
      renderForm();
      document.getElementById('add-toggle').style.display='';
    }catch(e){
      errEl.innerHTML = `<p class="error-text" style="margin:0 0 12px;">No s'ha pogut desar. Torna-ho a provar.</p>`;
      submitBtn.disabled=false; submitBtn.textContent='Afegeix a la llista';
    }
  };
}

async function deleteParticipant(id){
  try{
    await db.collection('events').doc(state.code).collection('participants').doc(id).delete();
  }catch(e){}
}

function renderDynamicSections(){
  const listEl = document.getElementById('ledger-list');
  const summaryEl = document.getElementById('summary-container');
  const settlementEl = document.getElementById('settlement-container');
  const statusEl = document.getElementById('status-dot');
  if (statusEl) statusEl.className = `status-dot ${state.connected?'':'offline'}`;
  if (!listEl) return;

  const participants = state.participants;

  if (participants.length === 0){
    listEl.innerHTML = `<div class="ledger-card empty-state"><p>Encara ningú ha afegit res. Sigues el primer! 🎉</p></div>`;
  } else {
    listEl.innerHTML = participants.map(p => `
      <div class="ledger-card participant-row">
        <div style="min-width:0;">
          <div class="pname">${escapeHtml(p.name)}</div>
          <div class="pfamily">${icon('users','currentColor',12)} ${p.familySize} ${p.familySize===1?'persona':'persones'}</div>
        </div>
        <div class="prow-right">
          <div class="pamount font-mono">${euros(p.amount)}</div>
          <button class="del-btn" data-id="${p.id}">${icon('trash','#A8462F',16)}</button>
        </div>
      </div>`).join('');
    listEl.querySelectorAll('.del-btn').forEach(btn=>{
      btn.onclick = ()=> deleteParticipant(btn.getAttribute('data-id'));
    });
  }

  if (participants.length === 0){
    summaryEl.innerHTML=''; settlementEl.innerHTML='';
    return;
  }

  const s = computeSettlement(participants);

  summaryEl.innerHTML = `
    <div class="ledger-card summary-card">
      <h2 class="font-display">Resum</h2>
      <div class="summary-row"><span class="k">Total gastat</span><span class="v font-mono">${euros(s.totalCents/100)}</span></div>
      <div class="summary-row"><span class="k">Persones representades</span><span class="v font-mono">${s.totalUnits}</span></div>
      <div class="summary-row"><span class="k">Cost just per persona</span><span class="v font-mono">${euros(s.perUnitCents/100)}</span></div>
    </div>`;

  settlementEl.innerHTML = `
    <div>
      <h2 class="font-display" style="font-size:17px;font-weight:600;margin:18px 0 10px;">Repartiment</h2>
      ${ s.transactions.length===0
        ? `<div class="ledger-card empty-state"><p>Tothom ha pagat la seva part justa. Res a repartir! ✅</p></div>`
        : s.transactions.map(t=>`
            <div class="ledger-card txn-row">
              <div class="txn-names">
                <span class="from">${escapeHtml(t.from)}</span>
                ${icon('arrow','currentColor',15)}
                <span class="to">${escapeHtml(t.to)}</span>
              </div>
              <div class="txn-amount font-mono">${euros(t.cents/100)}</div>
            </div>`).join('')
      }
    </div>`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

render();
</script>
</body>
</html>
